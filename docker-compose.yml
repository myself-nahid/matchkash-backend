version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: matchkash
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: matchkash_db
    ports:
      - "5432:5432"
      
  backend:
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env